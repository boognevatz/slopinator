<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Annotator v0.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-row">
      <div class="toolbar-group">
        <button id="btn-open" title="Open Image or SVG Project">Open</button>
        <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.gif,.bmp,.webp,.svg" hidden>
        <button id="btn-save-svg" title="Save SVG (Ctrl+S)" disabled>Save SVG</button>
        <div class="dropdown" id="export-dropdown">
          <button id="btn-export-jpg" title="Export as JPG" disabled>Export JPG ▾</button>
          <div class="dropdown-menu" id="export-menu" hidden>
            <button data-width="320">320px wide</button>
            <button data-width="640">640px wide</button>
            <button data-width="1920">1920px wide</button>
            <button data-width="original">Original size</button>
          </div>
        </div>
      </div>

      <div class="toolbar-group separator">
        <button id="btn-select" class="tool-btn active" title="Select (V)" data-tool="select">Select</button>
        <button id="btn-line" class="tool-btn" title="Line (L)" data-tool="line">Line</button>
        <button id="btn-text" class="tool-btn" title="Text (T)" data-tool="text">Text</button>
        <button id="btn-crop" class="tool-btn" title="Crop (C)" data-tool="crop">Crop</button>
        <button id="btn-freehand" class="tool-btn" title="Freehand (F)" data-tool="freehand">Freehand</button>
        <button id="btn-rectangle" class="tool-btn" title="Rectangle (R)" data-tool="rectangle">Rectangle</button>
      </div>

      <div class="toolbar-group separator">
        <button id="btn-undo" title="Undo (Ctrl+Z)" disabled>↩ Undo</button>
        <button id="btn-redo" title="Redo (Ctrl+Y)" disabled>↪ Redo</button>
      </div>

      <div class="toolbar-group separator">
        <button id="btn-rotate-ccw" title="Rotate 90° CCW" disabled>⟲ CCW</button>
        <button id="btn-rotate-cw" title="Rotate 90° CW" disabled>⟳ CW</button>
        <button id="btn-flip-h" title="Flip Horizontal" disabled>↔ Flip H</button>
        <button id="btn-flip-v" title="Flip Vertical" disabled>↕ Flip V</button>
      </div>

      <div class="toolbar-group separator">
        <button id="btn-zoom-in" title="Zoom In (+)" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        </button>
        <button id="btn-zoom-out" title="Zoom Out (-)" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        </button>
        <button id="btn-zoom-fit" title="Zoom Fit" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path></svg>
        </button>
        <button id="btn-zoom-11" title="1:1 (Actual Pixels)" disabled>1:1</button>
        <span class="toolbar-label" id="zoom-label" style="min-width: 140px; text-align: center;">100%</span>
      </div>

      <div class="toolbar-group separator" style="margin-left: auto;">
        <div class="dropdown" id="resize-dropdown">
          <span class="toolbar-label" id="image-size-label" style="cursor: pointer;"></span>
          <div class="dropdown-menu dropdown-menu-right" id="resize-menu" hidden>
            <div style="display: flex; flex-direction: column; gap: 6px; padding: 6px 10px;">
              <div style="display: flex; align-items: center; gap: 6px;">
                <span class="toolbar-label">W:</span>
                <input type="number" id="resize-width-input" class="small-input crop-size-input" min="1">
                <span class="toolbar-label">×</span>
                <span class="toolbar-label">H:</span>
                <input type="number" id="resize-height-input" class="small-input crop-size-input" min="1">
              </div>
              <div style="display: flex; flex-wrap: wrap; gap: 4px;">
                <label class="crop-ratio-option"><input type="radio" name="resize-ratio" value="free"> Free</label>
                <label class="crop-ratio-option"><input type="radio" name="resize-ratio" value="aspect" checked> Keep aspect</label>
                <label class="crop-ratio-option"><input type="radio" name="resize-ratio" value="4:3"> 4:3</label>
                <label class="crop-ratio-option"><input type="radio" name="resize-ratio" value="16:9"> 16:9</label>
              </div>
              <button id="btn-resize-apply" style="width:100%;">Resize</button>
            </div>
          </div>
        </div>
        <span class="toolbar-label" id="file-date-label" style="margin-left: 12px; font-size: 11px; color: #888; white-space: nowrap;"></span>
      </div>
    </div>

    <div class="toolbar-row">
      <div class="toolbar-group separator" id="color-group" hidden>
        <span class="toolbar-label">Color:</span>
        <div class="color-indicator" id="color-indicator">
          <div class="bg-click-area" id="bg-click-area">
            <div class="bg-square" id="bg-square"></div>
          </div>
          <div class="fg-click-area" id="fg-click-area">
            <div class="fg-square" id="fg-square"></div>
          </div>
          <div class="color-dropdown" id="color-dropdown" hidden>
            <div class="color-dropdown-swatches" id="color-dropdown-swatches"></div>
            <div class="color-dropdown-custom">
              <span class="toolbar-label">Custom:</span>
              <input type="color" id="color-dropdown-picker" value="#ff0000">
            </div>
            <div class="color-dropdown-opacity">
              <span class="toolbar-label">Opacity:</span>
              <input type="range" id="color-opacity-slider" min="0" max="255" value="255">
              <span class="toolbar-label" id="color-opacity-value">255</span>
            </div>
          </div>
        </div>
        <input type="color" id="color-picker-hidden" hidden>
      </div>

      <div class="toolbar-group separator" id="thickness-group" hidden>
        <span class="toolbar-label">Thickness:</span>
        <input type="range" id="thickness-slider" min="0" max="12" step="0.5" value="2">
        <span class="toolbar-label" id="thickness-value">2</span>
      </div>

      <div class="toolbar-group separator" id="freehand-epsilon-group" hidden>
        <span class="toolbar-label">Smoothing:</span>
        <input type="range" id="freehand-epsilon-slider" min="0" max="30" step="0.5" value="0">
        <span class="toolbar-label" id="freehand-epsilon-value">0</span>
      </div>

      <div class="toolbar-group separator" id="line-style-group" hidden>
        <span class="toolbar-label">Style:</span>
        <button id="btn-line-style-normal" class="line-style-btn" data-line-style="normal">Normal</button>
        <button id="btn-line-style-arrows" class="line-style-btn" data-line-style="arrows">Arrows</button>
        <button id="btn-line-style-circle" class="line-style-btn" data-line-style="circle">Circle</button>
        <span class="toolbar-label">Size:</span>
        <input type="number" id="line-marker-size-input" min="2" max="200" value="30" class="small-input">
      </div>

      <div class="toolbar-group separator" id="line-mode-group" hidden>
        <span class="toolbar-label">Mode:</span>
        <button id="btn-line-mode-move" class="line-mode-btn active" data-line-mode="move">Move</button>
        <button id="btn-line-mode-change-end" class="line-mode-btn" data-line-mode="change-end">Change End</button>
      </div>

      <div class="toolbar-group separator" id="font-size-group" hidden>
        <span class="toolbar-label">Font size:</span>
        <input type="number" id="font-size-input" min="8" max="999" value="32" class="small-input">
      </div>

      <div class="toolbar-group separator" id="delete-group" hidden>
        <button id="btn-delete" title="Delete selected (Del)" disabled>🗑 Delete</button>
      </div>

      <div class="toolbar-group separator" id="rectangle-group" hidden>
        <span class="toolbar-label">Corner radius:</span>
        <input type="number" id="corner-radius-input" min="0" max="999" value="0" class="small-input">
      </div>

      <div class="toolbar-group separator" id="crop-group" hidden>
        <span class="toolbar-label">Crop:</span>
        <span class="toolbar-label">W</span>
        <input type="number" id="crop-width-input" min="1" step="1" class="small-input crop-size-input">
        <span class="toolbar-label">x</span>
        <input type="number" id="crop-height-input" min="1" step="1" class="small-input crop-size-input">
        <label class="crop-ratio-option"><input type="checkbox" id="crop-ratio-original"> keep aspect</label>
        <label class="crop-ratio-option"><input type="checkbox" id="crop-ratio-4-3"> 4:3</label>
        <label class="crop-ratio-option"><input type="checkbox" id="crop-ratio-16-9"> 16:9</label>
      </div>

    </div>
  </div>

  <div id="editor-container">
    <div id="resize-notification" class="notification-strip" hidden>
      <span>Image is very large. Resize to:</span>
      <button data-width="320">320px</button>
      <button data-width="640">640px</button>
      <button data-width="1920">1920px</button>
      <button data-width="original">Keep Original</button>
      <button id="btn-close-notification" class="close-btn" title="Dismiss">×</button>
    </div>
    <svg id="editor-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
      <defs></defs>
      <g id="image-layer"></g>
      <g id="annotation-layer"></g>
      <g id="handle-layer"></g>
    </svg>
    <div id="empty-state">
      <p>Open an image or SVG project to start annotating</p>
      <button id="btn-open-empty">Open File</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
